<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DevOps Space Journey</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial, sans-serif;
}

.title {
  position:fixed;
  top:20px;
  width:100%;
  text-align:center;
  color:white;
  font-size:22px;
  letter-spacing:3px;
}

#panel {
  position:fixed;
  right:40px;
  top:50%;
  transform:translateY(-50%);
  width:340px;
  padding:20px;
  background:rgba(0,0,0,0.9);
  border:1px solid #00ffff;
  border-radius:12px;
  color:white;
  display:none;
}

#panel h2 {
  margin-top:0;
  color:#00ffff;
}
</style>
</head>
<body>

<div class="title">🚀 DevOps Space Journey</div>
<div id="panel"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://threejs.org/examples/js/loaders/FontLoader.js"></script>
<script src="https://threejs.org/examples/js/geometries/TextGeometry.js"></script>

<script>

/* =======================
   BASIC SCENE SETUP
======================= */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  5000
);
camera.position.set(0,0,80);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* =======================
   LIGHTING
======================= */

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const pointLight = new THREE.PointLight(0xffffff, 1.5);
pointLight.position.set(50,50,50);
scene.add(pointLight);

/* =======================
   STARFIELD
======================= */

const starGeometry = new THREE.BufferGeometry();
const starVertices = [];

for(let i=0;i<15000;i++){
  starVertices.push(
    THREE.MathUtils.randFloatSpread(3000),
    THREE.MathUtils.randFloatSpread(3000),
    THREE.MathUtils.randFloatSpread(3000)
  );
}

starGeometry.setAttribute(
  "position",
  new THREE.Float32BufferAttribute(starVertices,3)
);

const starMaterial = new THREE.PointsMaterial({
  color:0xffffff,
  size:1.5
});

const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

/* =======================
   EARTH (START POINT)
======================= */

const earthTexture = new THREE.TextureLoader().load(
  "https://threejs.org/examples/textures/earth_atmos_2048.jpg"
);

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(10,64,64),
  new THREE.MeshStandardMaterial({map:earthTexture})
);

scene.add(earth);

/* =======================
   SKILLS DATA
======================= */

const skills = [
 {name:"Kubernetes",info:"Container orchestration platform for automating deployment and scaling."},
 {name:"Docker",info:"Container platform that packages applications with dependencies."},
 {name:"Linux",info:"Open-source OS powering servers and cloud infrastructure."},
 {name:"Python",info:"Automation, scripting, and backend development language."},
 {name:"AWS",info:"Cloud platform providing scalable infrastructure services."},
 {name:"Jenkins",info:"CI/CD automation server."},
 {name:"Grafana",info:"Monitoring and observability dashboard platform."},
 {name:"Terraform",info:"Infrastructure as Code tool for provisioning resources."}
];

const textObjects = [];
const fontLoader = new THREE.FontLoader();

/* =======================
   LOAD FONT & CREATE 3D TEXT
======================= */

fontLoader.load(
 "https://threejs.org/examples/fonts/helvetiker_regular.typeface.json",
 function(font){

  skills.forEach((skill,i)=>{

    const textGeometry = new THREE.TextGeometry(skill.name,{
      font:font,
      size:5,
      height:1,
      curveSegments:8
    });

    const textMaterial = new THREE.MeshStandardMaterial({
      color:0x00ffff,
      emissive:0x0088ff,
      emissiveIntensity:0.6
    });

    const textMesh = new THREE.Mesh(textGeometry,textMaterial);

    // Spiral tunnel layout
    textMesh.position.set(
      Math.sin(i)*25,
      Math.cos(i*1.2)*18,
      -150 - i*150
    );

    textMesh.userData = skill;

    scene.add(textMesh);
    textObjects.push(textMesh);
  });

 }
);

/* =======================
   CLICK INTERACTION
======================= */

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click",(event)=>{
  mouse.x = (event.clientX/window.innerWidth)*2 -1;
  mouse.y = -(event.clientY/window.innerHeight)*2 +1;

  raycaster.setFromCamera(mouse,camera);

  const intersects = raycaster.intersectObjects(textObjects);

  if(intersects.length > 0){
    const data = intersects[0].object.userData;

    const panel = document.getElementById("panel");
    panel.innerHTML = "<h2>"+data.name+"</h2><p>"+data.info+"</p>";
    panel.style.display="block";
  }
});

/* =======================
   TRAVEL + AUTO REPLAY
======================= */

let speed = 0.8;
let takeoff = true;

const lastSkillZ = -150 - (skills.length - 1) * 150;
const resetPoint = lastSkillZ - 200;

function resetJourney(){
  camera.position.set(0,0,80);
  takeoff = true;
  document.getElementById("panel").style.display="none";
}

function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.003;

  if(takeoff){
    camera.position.z -= 0.4;
    if(camera.position.z < 40){
      takeoff = false;
    }
  } else {
    camera.position.z -= speed;
  }

  // Reset after last skill
  if(camera.position.z < resetPoint){
    resetJourney();
  }

  renderer.render(scene,camera);
}

animate();

/* =======================
   RESPONSIVE
======================= */

window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
