<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Skills Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at bottom, #0b0f2b 0%, #000 100%);
    font-family: Arial, Helvetica, sans-serif;
    color: white;
}

/* Stars */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: url("https://www.transparenttextures.com/patterns/stardust.png");
    animation: stars 200s linear infinite;
}

@keyframes stars {
    from { transform: translate(0, 0); }
    to { transform: translate(-1000px, -1000px); }
}

/* Rocket */
#rocket {
    position: absolute;
    width: 50px;
    height: 50px;
    pointer-events: none;
    transition: transform 0.1s;
    font-size: 40px;
}

/* Planets */
.planet {
    position: absolute;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    font-weight: bold;
}

.planet:hover {
    transform: scale(1.2);
    box-shadow: 0 0 30px white;
}

/* Individual planet colors */
.kubernetes { background: #326ce5; top: 20%; left: 15%; }
.docker { background: #2496ed; top: 60%; left: 10%; }
.linux { background: #f7df1e; color: black; top: 35%; left: 40%; }
.python { background: #3776ab; top: 70%; left: 45%; }
.aws { background: #ff9900; color: black; top: 25%; left: 70%; }
.jenkins { background: #d24939; top: 60%; left: 75%; }
.grafana { background: #f46800; top: 40%; left: 85%; }
.terraform { background: #844fba; top: 80%; left: 25%; }

.title {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="title">🚀 Exploring My DevOps Universe</div>

<div id="rocket">🚀</div>

<div class="planet kubernetes">Kubernetes</div>
<div class="planet docker">Docker</div>
<div class="planet linux">Linux</div>
<div class="planet python">Python</div>
<div class="planet aws">AWS</div>
<div class="planet jenkins">Jenkins</div>
<div class="planet grafana">Grafana</div>
<div class="planet terraform">Terraform</div>

<script>
const rocket = document.getElementById("rocket");

document.addEventListener("mousemove", (e) => {
    rocket.style.left = e.pageX + "px";
    rocket.style.top = e.pageY + "px";
});
</script>

</body>
</html>
